<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Site Temporarily Unavailable | Kaushik Parui</title>

  <!-- Favicon -->
  <link rel="icon" href="/assets/favicon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png" />
  
  <!-- CSS -->
  <link rel="stylesheet" href="styles/outage.css" />

  <!-- SEO -->
  <meta name="description" content="Temporary outage. Kaushik Parui portfolio is currently unavailable. Check live system status for updates." />
  <meta name="author" content="Kaushik Parui" />

  <!-- Prevent indexing -->
  <meta name="robots" content="noindex, nofollow" />

  <!-- Canonical (point to main site) -->
  <link rel="canonical" href="https://www.kaushikparui.com/" />

  <!-- Open Graph -->
  <meta property="og:title" content="Service Unavailable | Kaushik Parui" />
  <meta property="og:description" content="The site is temporarily down. We're working to restore it quickly." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://outage.kaushikparui.com" />
  <meta property="og:image" content="https://www.kaushikparui.com/social-preview.webp" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Service Unavailable | Kaushik Parui" />
  <meta name="twitter:description" content="Temporary outage. Live status available." />
  <meta name="twitter:image" content="https://www.kaushikparui.com/social-preview.webp" />

  <!-- Theme color -->
  <meta name="theme-color" content="#090412" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#6d28d9" media="(prefers-color-scheme: light)" />

  <!-- Performance -->
  <link rel="preload" as="image" href="assets/logo/logo-ag-light.webp" />
  <link rel="preload" as="image" href="assets/logo/logo-ag-dark.webp" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>
  <!-- 🌗 Theme Toggle -->
  <button id="themeToggle" class="theme-toggle">🌙</button>

  <div class="card">
    <div class="logo-container">
      <img
        src="assets/logo/logo-ag-light.webp"
        alt="Kaushik Parui"
        class="logo logo-dark"
      />
      <img
        src="assets/logo/logo-ag-dark.webp"
        alt="Kaushik Parui"
        class="logo logo-light"
      />
    </div>

    <div class="icon">🚨</div>

    <h1>Website Temporarily Unavailable</h1>

    <p>
      <strong>kaushikparui.com</strong> is currently experiencing an issue.
    </p>

    <p>
      We're actively working to restore the service as quickly as possible.
    </p>

    <a
      class="status-link"
      href="https://status.kaushikparui.com"
      rel="noopener noreferrer"
    >
      View live status →
    </a>

    <div class="footer">
      Thanks for your patience. Please check back shortly.
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById("themeToggle");

    const savedTheme = localStorage.getItem("theme");

    let theme;

    if (savedTheme) {
      theme = savedTheme;
    } else {
      const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
      theme = prefersLight ? "light" : "dark";
    }

    document.body.classList.add(theme);

    function updateIcon() {
      toggleBtn.textContent = document.body.classList.contains("dark")
        ? "☀️"
        : "🌙";
    }

    updateIcon();

    toggleBtn.addEventListener("click", () => {
      if (document.body.classList.contains("dark")) {
        document.body.classList.replace("dark", "light");
        localStorage.setItem("theme", "light");
      } else {
        document.body.classList.replace("light", "dark");
        localStorage.setItem("theme", "dark");
      }
      updateIcon();
    });
  </script>
</body>
</html>
